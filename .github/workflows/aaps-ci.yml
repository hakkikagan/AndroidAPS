Name: AAPS CI

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: 'Select AAPS Version'
        required: true
        default: '3.4.2.3'
        type: choice
        options:
          - 3.4.2.3
          - 3.4.2.2
          - 3.4.2.1
          - 3.4.2.0
          - 3.4.1.0
          - 3.4.0.0
          - 3.3.2.1
          - 3.3.2.0
          - 3.3.1.3
          - 3.2.0.4
          - 3.2.0.3
          - 3.2.0.2
          - 3.2.0.1
          - 3.2.0.0
          - 3.1.0.3
          - 3.1.0.2
          - 3.1.0.1
          - 3.1.0
          - 3.0.0.2
          - 3.0.0.1
          - 3.0.0
      buildVariant:
        description: 'Select Build Variant'
        required: true
        default: 'fullRelease'
        type: choice
        options:
          - fullRelease
          - fullDebug
          - aapsclientRelease
          - aapsclientDebug
          - aapsclient2Release
          - aapsclient2Debug
          - pumpcontrolRelease
          - pumpcontrolDebug

jobs:
  build:
    name: Build AAPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code at tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch selected tag from upstream
        run: |
          git remote add upstream https://github.com/nightscout/AndroidAPS.git || true
          git fetch upstream refs/tags/${{ github.event.inputs.tagName }}:refs/tags/${{ github.event.inputs.tagName }}
          echo "✅ Tag ${{ github.event.inputs.tagName }} fetched from upstream."

      - name: Determine JVM version from tag
        run: |
          TAG="${{ github.event.inputs.tagName }}"
          JAVA_VERSION=$(jq -r '.default' .github/jdk-map.json)
          while IFS=$'\t' read -r pattern jdk; do
            if [[ "$TAG" == $pattern ]]; then
              JAVA_VERSION="$jdk"
              break
            fi
          done < <(jq -r '.mappings[] | "\(.pattern)\t\(.jdk)"' .github/jdk-map.json)
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_ENV
          echo "ℹ️ Tag $TAG → JDK $JAVA_VERSION"

      - name: Switch to selected tag
        run: |
          git checkout refs/tags/${{ github.event.inputs.tagName }}
          echo "✅ Checked out tag ${{ github.event.inputs.tagName }}"

      - name: Copy Keystore to App Folder
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          cp androidaps.jks "$RUNNER_TEMP/keystore/keystore.jks"
          echo "✅ Keystore copied to temp folder."

      - name: Set BUILD_VARIANT
        run: |
          BUILD_VARIANT="${{ github.event.inputs.buildVariant }}"
          echo "BUILD_VARIANT=$BUILD_VARIANT" >> $GITHUB_ENV
          VARIANT_FLAVOR=$(echo "$BUILD_VARIANT" | sed -E 's/(Release|Debug)$//' | tr '[:upper:]' '[:lower:]')
          VARIANT_TYPE=$(echo "$BUILD_VARIANT" | grep -oE '(Release|Debug)$' | tr '[:upper:]' '[:lower:]')
          echo "VARIANT_FLAVOR=$VARIANT_FLAVOR" >> $GITHUB_ENV
          echo "VARIANT_TYPE=$VARIANT_TYPE" >> $GITHUB_ENV
          VERSION_SUFFIX=""
          if [[ "$VARIANT_FLAVOR" != "full" ]]; then VERSION_SUFFIX="$VARIANT_FLAVOR"; fi
          if [[ "$VARIANT_TYPE" == "debug" ]]; then VERSION_SUFFIX="$VERSION_SUFFIX-debug"; fi
          if [[ -n "$VERSION_SUFFIX" && "$VERSION_SUFFIX" != -* ]]; then VERSION_SUFFIX="-$VERSION_SUFFIX"; fi
          echo "VERSION_SUFFIX=$VERSION_SUFFIX" >> $GITHUB_ENV

      - name: Extract VERSION
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          if echo "$BRANCH_NAME" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            VERSION="$BRANCH_NAME"
          else
            VERSION=$(grep 'val appVersion' buildSrc/src/main/kotlin/Versions.kt | awk -F '"' '{print $2}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: |
          ./gradlew :app:assemble${{ env.BUILD_VARIANT }} :wear:assemble${{ env.BUILD_VARIANT }} \
          -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
          -Dkotlin.daemon.jvm.options="-Xmx2g" \
          -Dkotlin.compiler.execution.strategy="in-process" \
          -Dorg.gradle.daemon=true \
          -Dorg.gradle.workers.max=8 \
          -Dorg.gradle.caching=true \
          -Pandroid.injected.signing.store.file="$RUNNER_TEMP/keystore/keystore.jks" \
          -Pandroid.injected.signing.store.password="${{ secrets.ZIP_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.ZIP_PASSWORD }}"

      - name: Rename APKs with version
        run: |
          mv app/build/outputs/apk/${{ env.VARIANT_FLAVOR }}/${{ env.VARIANT_TYPE }}/*.apk aaps-${{ env.VERSION }}${{ env.VERSION_SUFFIX }}.apk
          mv wear/build/outputs/apk/${{ env.VARIANT_FLAVOR }}/${{ env.VARIANT_TYPE }}/*.apk aaps-wear-${{ env.VERSION }}${{ env.VERSION_SUFFIX }}.apk

      - name: Upload APKs to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AAPS-APKs
          path: |
            aaps-*.apk
